<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIS Decision Algorithm</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CONTRAINDICATIONS = [
  "Active internal bleeding or hemorrhagic diathesis",
  "BP >185/110 mmHg not controlled before treatment",
  "INR >1.7 or PT >15 sec",
  "Platelet count <100,000/mm³",
  "Direct-acting anticoagulants within previous 48 h",
  "Prior intracranial hemorrhage",
  "Ischemic stroke or serious head trauma within 3 months",
  "Intracranial neoplasm, AVM, or aneurysm",
  "GI/GU hemorrhage within 21 days",
  "Major surgery within 14 days",
  "Arterial puncture at non-compressible site within 7 days",
  "Receiving lecanemab or anti-amyloid antibody therapy",
];

const steps = ["Assessment","Timing","Severity","Imaging","Contraindications","Recommendation"];

function StepBar({current}){
  return(
    <div style={{display:"flex",marginBottom:24}}>
      {steps.map((s,i)=>(
        <div key={i} style={{flex:1,textAlign:"center"}}>
          <div style={{
            width:28,height:28,borderRadius:"50%",margin:"0 auto 4px",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:12,fontWeight:600,
            background:i<current?"#0C447C":i===current?"#185FA5":"#e2e8f0",
            color:i<=current?"#fff":"#94a3b8"
          }}>{i<current?"✓":i+1}</div>
          <div style={{fontSize:9,color:i===current?"#0C447C":"#94a3b8",fontWeight:i===current?600:400}}>{s}</div>
          {i<steps.length-1&&<div style={{position:"absolute"}}/>}
        </div>
      ))}
    </div>
  );
}

function Label({children}){
  return <label style={{display:"block",fontSize:12,fontWeight:600,color:"#334155",marginBottom:6}}>{children}</label>;
}
function Input({...p}){
  return <input {...p} style={{width:"100%",padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,color:"#1e293b",...p.style}}/>;
}
function Btn({children,onClick,variant="primary",disabled}){
  const bg=variant==="primary"?"#0C447C":variant==="outline"?"#fff":"#e2e8f0";
  const col=variant==="primary"?"#fff":variant==="outline"?"#0C447C":"#64748b";
  const brd=variant==="outline"?"1px solid #0C447C":"1px solid transparent";
  return(
    <button onClick={onClick} disabled={disabled} style={{
      padding:"9px 20px",background:bg,color:col,border:brd,
      borderRadius:6,fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",
      opacity:disabled?0.5:1
    }}>{children}</button>
  );
}
function Card({children,color}){
  const colors={blue:{bg:"#E6F1FB",bd:"#185FA5"},purple:{bg:"#EEEDFE",bd:"#534AB7"},green:{bg:"#EAF3DE",bd:"#3B6D11"},red:{bg:"#FCEBEB",bd:"#A32D2D"},amber:{bg:"#FAEEDA",bd:"#854F0B"}};
  const c=colors[color]||{bg:"#f8fafc",bd:"#e2e8f0"};
  return<div style={{background:c.bg,border:`1px solid ${c.bd}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>{children}</div>;
}

function Step1({data,set,next}){
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 1 — Initial assessment</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Confirm clinical probability of acute ischemic stroke.</p>
      <Card color="blue">
        <p style={{fontSize:12,color:"#1e40af",fontWeight:600,marginBottom:8}}>Is this likely acute ischemic stroke?</p>
        <p style={{fontSize:11.5,color:"#334155",marginBottom:12}}>Sudden focal neurological deficit consistent with a single cerebral arterial territory. <b>Note:</b> ICH cannot be excluded clinically — brain imaging is mandatory.</p>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{set({...data,aisLikely:true});next()}} variant={data.aisLikely===true?"primary":"outline"}>Yes — proceed</Btn>
          <Btn onClick={()=>set({...data,aisLikely:false})} variant={data.aisLikely===false?"primary":"outline"}>No / uncertain</Btn>
        </div>
        {data.aisLikely===false&&<p style={{marginTop:10,fontSize:11.5,color:"#A32D2D",fontWeight:600}}>Consider stroke mimics (migraine, seizure, hypoglycemia, vestibular). Evaluate further before treatment.</p>}
      </Card>
    </div>
  );
}

function Step2({data,set,next,back}){
  const [h,setH]=useState(data.lkwHours||"");
  const [wakeUp,setWakeUp]=useState(data.wakeUp||false);
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 2 — Time since last known well</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Time is measured from when the patient was last confirmed to be at neurological baseline.</p>
      <Card color="blue">
        <Label>Hours since last known well (LKW)</Label>
        <Input type="number" min="0" max="96" step="0.5" value={h} placeholder="e.g. 2.5"
          onChange={e=>{setH(e.target.value);set({...data,lkwHours:parseFloat(e.target.value)||0})}}/>
        <div style={{marginTop:12,display:"flex",alignItems:"center",gap:8}}>
          <input type="checkbox" id="wu" checked={wakeUp} onChange={e=>{setWakeUp(e.target.checked);set({...data,wakeUp:e.target.checked})}}/>
          <label htmlFor="wu" style={{fontSize:12,color:"#334155"}}>Wake-up stroke (LKW = time last seen well before sleep)</label>
        </div>
      </Card>
      {h&&<Card color={parseFloat(h)<=4.5?"green":parseFloat(h)<=24?"amber":"red"}>
        <p style={{fontSize:12,fontWeight:600,color:parseFloat(h)<=4.5?"#166534":parseFloat(h)<=24?"#633806":"#991b1b"}}>
          {parseFloat(h)<=4.5?"Within 4.5 h — IV tPA window open":parseFloat(h)<=6?"4.5–6 h — IV tPA window closed; MT may be eligible":parseFloat(h)<=24?"6–24 h — extended MT window; assess imaging criteria":"Beyond 24 h — standard MT not indicated; consider extended-window trials"}
        </p>
      </Card>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next} disabled={!h}>Next →</Btn>
      </div>
    </div>
  );
}

function Step3({data,set,next,back}){
  const [nihss,setNihss]=useState(data.nihss||"");
  const [glucose,setGlucose]=useState(data.glucose||"");
  const glucoseLow=parseFloat(glucose)<2.8&&glucose!=="";
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 3 — Severity &amp; blood glucose</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Assess neurological deficit and exclude hypoglycemia as stroke mimic.</p>
      <Card color="blue">
        <Label>NIHSS score (0–42)</Label>
        <Input type="number" min="0" max="42" value={nihss} placeholder="Enter NIHSS"
          onChange={e=>{setNihss(e.target.value);set({...data,nihss:parseInt(e.target.value)||0})}}/>
        {nihss&&<p style={{marginTop:6,fontSize:11.5,color:parseInt(nihss)>=6?"#166534":parseInt(nihss)>0?"#854F0B":"#64748b",fontWeight:600}}>
          {parseInt(nihss)===0?"NIHSS 0 — asymptomatic":parseInt(nihss)<=5?"NIHSS 1–5 — minor / non-disabling stroke":"NIHSS ≥6 — disabling stroke (eligible for IV tPA if other criteria met)"}
        </p>}
      </Card>
      <Card color={glucoseLow?"red":"blue"}>
        <Label>Blood glucose (mmol/L)</Label>
        <Input type="number" min="0" max="30" step="0.1" value={glucose} placeholder="e.g. 5.6"
          onChange={e=>{setGlucose(e.target.value);set({...data,glucose:parseFloat(e.target.value)||0})}}/>
        {glucoseLow&&<p style={{marginTop:8,fontSize:12,color:"#991b1b",fontWeight:600}}>⚠ Blood glucose &lt;2.8 mmol/L — treat hypoglycemia first. This may be a stroke mimic.</p>}
        {glucose&&!glucoseLow&&<p style={{marginTop:6,fontSize:11.5,color:"#166534"}}>Blood glucose normal — hypoglycemia excluded as stroke mimic.</p>}
      </Card>
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next} disabled={!nihss||!glucose||glucoseLow}>Next →</Btn>
      </div>
    </div>
  );
}

function Step4({data,set,next,back}){
  const [ich,setIch]=useState(data.ich);
  const [lvo,setLvo]=useState(data.lvo);
  const [aspects,setAspects]=useState(data.aspects||"");
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 4 — Neuroimaging</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>NCCT is mandatory. CTA/MRA required for LVO assessment.</p>
      <Card color={ich===true?"red":ich===false?"green":"blue"}>
        <Label>NCCT: intracerebral hemorrhage present?</Label>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{setIch(true);set({...data,ich:true})}} variant={ich===true?"primary":"outline"}>Yes — ICH</Btn>
          <Btn onClick={()=>{setIch(false);set({...data,ich:false})}} variant={ich===false?"primary":"outline"}>No ICH</Btn>
        </div>
        {ich===true&&<p style={{marginTop:10,fontSize:12,color:"#991b1b",fontWeight:600}}>ICH confirmed — IV thrombolysis absolutely contraindicated. Manage as hemorrhagic stroke.</p>}
      </Card>
      {ich===false&&<>
        <Card color="blue">
          <Label>ASPECTS score (0–10)</Label>
          <Input type="number" min="0" max="10" value={aspects} placeholder="Enter ASPECTS"
            onChange={e=>{setAspects(e.target.value);set({...data,aspects:parseInt(e.target.value)||0})}}/>
          {aspects&&<p style={{marginTop:6,fontSize:11.5,fontWeight:600,color:parseInt(aspects)>=6?"#166534":parseInt(aspects)>=3?"#854F0B":"#991b1b"}}>
            {parseInt(aspects)>=7?"ASPECTS ≥7 — small or no ischemic core":parseInt(aspects)>=3?"ASPECTS 3–5 — large core (MT may still benefit within 24 h)":"ASPECTS 0–2 — very large core; poor prognosis with or without treatment"}
          </p>}
        </Card>
        <Card color="blue">
          <Label>CTA/MRA: large vessel occlusion (LVO) identified?</Label>
          <div style={{display:"flex",gap:10,marginBottom:8}}>
            <Btn onClick={()=>{setLvo(true);set({...data,lvo:true})}} variant={lvo===true?"primary":"outline"}>Yes — LVO</Btn>
            <Btn onClick={()=>{setLvo(false);set({...data,lvo:false})}} variant={lvo===false?"primary":"outline"}>No LVO</Btn>
          </div>
          {lvo===true&&<p style={{fontSize:11.5,color:"#166534",fontWeight:600}}>LVO confirmed — assess MT eligibility based on time window and imaging.</p>}
          {lvo===false&&<p style={{fontSize:11.5,color:"#854F0B",fontWeight:600}}>No LVO — MT not indicated. Proceed to antithrombotic therapy.</p>}
        </Card>
      </>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next} disabled={ich===undefined||ich===true||(ich===false&&(!aspects||lvo===undefined))}>Next →</Btn>
      </div>
    </div>
  );
}

function Step5({data,set,next,back}){
  const [checked,setChecked]=useState(data.contraindications||[]);
  const toggle=(c)=>{
    const n=checked.includes(c)?checked.filter(x=>x!==c):[...checked,c];
    setChecked(n);set({...data,contraindications:n});
  };
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 5 — Contraindications to IV thrombolysis</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:16}}>Check all that apply. Any ticked item is a contraindication to IV tPA (patient may still be eligible for MT).</p>
      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"12px 14px"}}>
        {CONTRAINDICATIONS.map((c,i)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 0",borderBottom:i<CONTRAINDICATIONS.length-1?"1px solid #f1f5f9":"none"}}>
            <input type="checkbox" id={`c${i}`} checked={checked.includes(c)} onChange={()=>toggle(c)} style={{marginTop:2,flexShrink:0}}/>
            <label htmlFor={`c${i}`} style={{fontSize:11.5,color:checked.includes(c)?"#991b1b":"#334155",cursor:"pointer"}}>{c}</label>
          </div>
        ))}
      </div>
      {checked.length>0&&<Card color="red"><p style={{fontSize:12,fontWeight:600,color:"#991b1b"}}>⚠ {checked.length} contraindication{checked.length>1?"s":""} to IV tPA noted. Patient may still be eligible for mechanical thrombectomy.</p></Card>}
      {checked.length===0&&<Card color="green"><p style={{fontSize:12,fontWeight:600,color:"#166534"}}>✓ No contraindications identified — proceed to treatment recommendation.</p></Card>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next}>Generate recommendation →</Btn>
      </div>
    </div>
  );
}

function Step6({data,back,reset}){
  const h=data.lkwHours||0;
  const nihss=data.nihss||0;
  const aspects=data.aspects||10;
  const lvo=data.lvo;
  const contra=data.contraindications||[];
  const glucose=data.glucose||5;
  const hasContra=contra.length>0;

  const recs=[];

  // IV tPA eligibility
  if(h<=4.5&&nihss>=6&&!hasContra&&glucose>=2.8){
    recs.push({type:"primary",color:"blue",title:"IV thrombolysis — indicated",body:`Start immediately. ${h<=1.5?"Excellent":"Good"} time-benefit window.\n• Alteplase 0.9 mg/kg IV (max 90 mg); 10% bolus over 1 min, remainder over 60 min\n• OR Tenecteplase 0.25 mg/kg IV bolus (max 25 mg) — non-inferior\n• Maintain BP <185/110 during infusion and <180/105 for 24 h after\n• Assess MT eligibility concurrently`});
  } else if(h<=4.5&&nihss>=1&&nihss<=5&&!hasContra){
    recs.push({type:"info",color:"amber",title:"IV thrombolysis — not recommended for NIHSS ≤5",body:"Minor non-disabling stroke. IV alteplase not superior to antiplatelet therapy (PRISMS, ARAMIS trials).\n• Initiate DAPT: clopidogrel + aspirin (preferred) or ticagrelor + aspirin\n• Start within 24 h, continue 21 days, then single antiplatelet"});
  } else if(h>4.5&&nihss>=6&&!hasContra){
    recs.push({type:"info",color:"amber",title:"IV thrombolysis — standard window closed",body:`LKW >${h<=9?"4.5–9 h: consider MRI/perfusion-guided alteplase (WAKE-UP, EXTEND trials)":"9 h: standard IV tPA not indicated"}.\n• Assess for extended-window tPA if wake-up stroke and MRI-DWI/FLAIR mismatch available`});
  }
  if(hasContra){
    recs.push({type:"warn",color:"red",title:"IV thrombolysis — contraindicated",body:`${contra.length} contraindication(s) identified:\n• ${contra.slice(0,3).join("\n• ")}${contra.length>3?`\n• ...and ${contra.length-3} more`:""}\n\nPatient may still be eligible for mechanical thrombectomy.`});
  }

  // MT eligibility
  if(lvo){
    if(aspects>=6&&h<=6){
      recs.push({type:"primary",color:"purple",title:"Mechanical thrombectomy — strongly indicated (0–6 h)",body:"ASPECTS ≥6, LVO confirmed, within standard window.\n• Proceed to endovascular suite immediately\n• Can be performed concurrently with IV tPA workup (bridging strategy)\n• Post-MT BP target: SBP 140–180 mmHg\n• Evidence: MR CLEAN, ESCAPE, SWIFT PRIME, EXTEND-IA, THRACE"});
    } else if(h>6&&h<=16){
      recs.push({type:"primary",color:"purple",title:"Mechanical thrombectomy — extended window (6–16 h)",body:"Assess DEFUSE 3 or DAWN eligibility:\n• DEFUSE 3: CTP or MRP to confirm penumbra >1.8× core, core <70 mL\n• DAWN: CTP or MRI-DWI mismatch (deficit too large for core size)\n• If criteria met: proceed to MT\n• Post-MT BP target: SBP 140–180 mmHg"});
    } else if(h>16&&h<=24){
      recs.push({type:"primary",color:"purple",title:"Mechanical thrombectomy — late window (16–24 h)",body:"Assess DAWN eligibility only (DEFUSE 3 did not include >16 h):\n• Age ≥80: NIHSS ≥10, core <21 mL\n• Age <80: NIHSS ≥10, core <31 mL; or NIHSS ≥20, core <51 mL\n• CTP or MRI-DWI required\n• Post-MT BP target: SBP 140–180 mmHg"});
    } else if(aspects>=3&&aspects<=5&&h<=24){
      recs.push({type:"info",color:"amber",title:"Mechanical thrombectomy — large core (ASPECTS 3–5)",body:"Evidence from ANGEL-ASPECT, SELECT2, TENSION, LASTE (2023):\n• MT still shows benefit vs medical management alone\n• Most patients will remain functionally disabled (mRS 3–5)\n• Discuss prognosis with family before proceeding\n• No additional perfusion imaging required\n• Post-MT BP target: SBP 140–180 mmHg"});
    }
  } else if(lvo===false){
    recs.push({type:"info",color:"green",title:"Mechanical thrombectomy — not indicated (no LVO)",body:"No large vessel occlusion identified.\n• If NIHSS ≤5: initiate DAPT (clopidogrel + aspirin) within 24 h\n• If NIHSS ≥6: initiate aspirin 300 mg loading dose\n• Investigate stroke etiology: echocardiogram, cardiac monitoring for AF, lipids, HbA1c"});
  }

  // Antithrombotic fallback
  if(!recs.length){
    recs.push({type:"info",color:"green",title:"Antithrombotic therapy",body:"No IV tPA or MT indication identified.\n• Aspirin 160–300 mg within 48 h (all AIS patients)\n• NIHSS ≤5: consider DAPT (clopidogrel + ASA or ticagrelor + ASA)\n• Hold antithrombotics 24 h if IV tPA was given"});
  }

  const typeColors={primary:"#0C447C",info:"#633806",warn:"#991b1b"};
  const bgColors={blue:"#E6F1FB",purple:"#EEEDFE",green:"#EAF3DE",amber:"#FAEEDA",red:"#FCEBEB"};
  const bdColors={blue:"#185FA5",purple:"#534AB7",green:"#3B6D11",amber:"#854F0B",red:"#A32D2D"};

  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 6 — Recommendation</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Based on the information entered. Always verify with clinical judgment and local protocols.</p>

      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:11}}>
        <b style={{color:"#334155"}}>Summary:</b>{" "}
        <span style={{color:"#64748b"}}>LKW {h}h · NIHSS {nihss} · Glucose {glucose} mmol/L · ASPECTS {aspects} · LVO: {lvo?"Yes":"No"} · Contraindications: {contra.length}</span>
      </div>

      {recs.map((r,i)=>(
        <div key={i} style={{background:bgColors[r.color],border:`1.5px solid ${bdColors[r.color]}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
          <p style={{fontSize:13,fontWeight:700,color:typeColors[r.type]||bdColors[r.color],marginBottom:8}}>{r.title}</p>
          {r.body.split("\n").map((line,j)=>(
            <p key={j} style={{fontSize:11.5,color:"#334155",marginBottom:3,paddingLeft:line.startsWith("•")?"0":"0"}}>{line}</p>
          ))}
        </div>
      ))}

      <Card color="amber">
        <p style={{fontSize:11,color:"#633806"}}><b>Important:</b> This tool is a decision support aid only. All treatment decisions must be made by a qualified clinician accounting for the full clinical picture, patient preferences, and local resources. In case of doubt, consult stroke neurology immediately.</p>
      </Card>

      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Review inputs</Btn>
        <Btn onClick={reset} variant="outline">↺ Start new case</Btn>
      </div>
    </div>
  );
}

function App(){
  const [step,setStep]=useState(0);
  const [data,setData]=useState({});
  const next=()=>setStep(s=>Math.min(s+1,5));
  const back=()=>setStep(s=>Math.max(s-1,0));
  const reset=()=>{setData({});setStep(0);};

  const containerStyle={maxWidth:680,margin:"0 auto",background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,.1)"};
  const headerStyle={background:"#0C447C",padding:"16px 24px",display:"flex",alignItems:"center",gap:12};
  const bodyStyle={padding:"24px"};

  return(
    <div style={containerStyle}>
      <div style={headerStyle}>
        <div style={{width:40,height:40,background:"rgba(255,255,255,.15)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🧠</div>
        <div>
          <h1 style={{color:"#E6F1FB",fontSize:15,fontWeight:600,margin:0}}>AIS Clinical Decision Algorithm</h1>
          <p style={{color:"#85B7EB",fontSize:10.5,margin:"2px 0 0"}}>Ho &amp; Powers, <em>Annu. Rev. Med.</em> 2025 · AHA/ASA 2019 Guidelines</p>
        </div>
      </div>
      <div style={bodyStyle}>
        <StepBar current={step}/>
        {step===0&&<Step1 data={data} set={setData} next={next}/>}
        {step===1&&<Step2 data={data} set={setData} next={next} back={back}/>}
        {step===2&&<Step3 data={data} set={setData} next={next} back={back}/>}
        {step===3&&<Step4 data={data} set={setData} next={next} back={back}/>}
        {step===4&&<Step5 data={data} set={setData} next={next} back={back}/>}
        {step===5&&<Step6 data={data} back={back} reset={reset}/>}
      </div>
      <div style={{background:"#f8fafc",borderTop:"1px solid #e2e8f0",padding:"8px 24px",fontSize:9,color:"#94a3b8"}}>
        For educational use only · Not a substitute for clinical judgment · Reference: Ho JP, Powers WJ. <em>Annu. Rev. Med.</em> 2025; 76:417–29
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIS Decision Algorithm</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const CONTRAINDICATIONS = [
  "Active internal bleeding or hemorrhagic diathesis",
  "BP >185/110 mmHg not controlled before treatment",
  "INR >1.7 or PT >15 sec",
  "Platelet count <100,000/mm³",
  "Direct-acting anticoagulants within previous 48 h",
  "Prior intracranial hemorrhage",
  "Ischemic stroke or serious head trauma within 3 months",
  "Intracranial neoplasm, AVM, or aneurysm",
  "GI/GU hemorrhage within 21 days",
  "Major surgery within 14 days",
  "Arterial puncture at non-compressible site within 7 days",
  "Receiving lecanemab or anti-amyloid antibody therapy",
];

const steps = ["Assessment","Timing","Severity","Imaging","Contraindications","Recommendation"];

function StepBar({current}){
  return(
    <div style={{display:"flex",marginBottom:24}}>
      {steps.map((s,i)=>(
        <div key={i} style={{flex:1,textAlign:"center"}}>
          <div style={{
            width:28,height:28,borderRadius:"50%",margin:"0 auto 4px",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:12,fontWeight:600,
            background:i<current?"#0C447C":i===current?"#185FA5":"#e2e8f0",
            color:i<=current?"#fff":"#94a3b8"
          }}>{i<current?"✓":i+1}</div>
          <div style={{fontSize:9,color:i===current?"#0C447C":"#94a3b8",fontWeight:i===current?600:400}}>{s}</div>
          {i<steps.length-1&&<div style={{position:"absolute"}}/>}
        </div>
      ))}
    </div>
  );
}

function Label({children}){
  return <label style={{display:"block",fontSize:12,fontWeight:600,color:"#334155",marginBottom:6}}>{children}</label>;
}
function Input({...p}){
  return <input {...p} style={{width:"100%",padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,color:"#1e293b",...p.style}}/>;
}
function Btn({children,onClick,variant="primary",disabled}){
  const bg=variant==="primary"?"#0C447C":variant==="outline"?"#fff":"#e2e8f0";
  const col=variant==="primary"?"#fff":variant==="outline"?"#0C447C":"#64748b";
  const brd=variant==="outline"?"1px solid #0C447C":"1px solid transparent";
  return(
    <button onClick={onClick} disabled={disabled} style={{
      padding:"9px 20px",background:bg,color:col,border:brd,
      borderRadius:6,fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",
      opacity:disabled?0.5:1
    }}>{children}</button>
  );
}
function Card({children,color}){
  const colors={blue:{bg:"#E6F1FB",bd:"#185FA5"},purple:{bg:"#EEEDFE",bd:"#534AB7"},green:{bg:"#EAF3DE",bd:"#3B6D11"},red:{bg:"#FCEBEB",bd:"#A32D2D"},amber:{bg:"#FAEEDA",bd:"#854F0B"}};
  const c=colors[color]||{bg:"#f8fafc",bd:"#e2e8f0"};
  return<div style={{background:c.bg,border:`1px solid ${c.bd}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>{children}</div>;
}

function Step1({data,set,next}){
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 1 — Initial assessment</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Confirm clinical probability of acute ischemic stroke.</p>
      <Card color="blue">
        <p style={{fontSize:12,color:"#1e40af",fontWeight:600,marginBottom:8}}>Is this likely acute ischemic stroke?</p>
        <p style={{fontSize:11.5,color:"#334155",marginBottom:12}}>Sudden focal neurological deficit consistent with a single cerebral arterial territory. <b>Note:</b> ICH cannot be excluded clinically — brain imaging is mandatory.</p>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{set({...data,aisLikely:true});next()}} variant={data.aisLikely===true?"primary":"outline"}>Yes — proceed</Btn>
          <Btn onClick={()=>set({...data,aisLikely:false})} variant={data.aisLikely===false?"primary":"outline"}>No / uncertain</Btn>
        </div>
        {data.aisLikely===false&&<p style={{marginTop:10,fontSize:11.5,color:"#A32D2D",fontWeight:600}}>Consider stroke mimics (migraine, seizure, hypoglycemia, vestibular). Evaluate further before treatment.</p>}
      </Card>
    </div>
  );
}

function Step2({data,set,next,back}){
  const [h,setH]=useState(data.lkwHours||"");
  const [wakeUp,setWakeUp]=useState(data.wakeUp||false);
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 2 — Time since last known well</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Time is measured from when the patient was last confirmed to be at neurological baseline.</p>
      <Card color="blue">
        <Label>Hours since last known well (LKW)</Label>
        <Input type="number" min="0" max="96" step="0.5" value={h} placeholder="e.g. 2.5"
          onChange={e=>{setH(e.target.value);set({...data,lkwHours:parseFloat(e.target.value)||0})}}/>
        <div style={{marginTop:12,display:"flex",alignItems:"center",gap:8}}>
          <input type="checkbox" id="wu" checked={wakeUp} onChange={e=>{setWakeUp(e.target.checked);set({...data,wakeUp:e.target.checked})}}/>
          <label htmlFor="wu" style={{fontSize:12,color:"#334155"}}>Wake-up stroke (LKW = time last seen well before sleep)</label>
        </div>
      </Card>
      {h&&<Card color={parseFloat(h)<=4.5?"green":parseFloat(h)<=24?"amber":"red"}>
        <p style={{fontSize:12,fontWeight:600,color:parseFloat(h)<=4.5?"#166534":parseFloat(h)<=24?"#633806":"#991b1b"}}>
          {parseFloat(h)<=4.5?"Within 4.5 h — IV tPA window open":parseFloat(h)<=6?"4.5–6 h — IV tPA window closed; MT may be eligible":parseFloat(h)<=24?"6–24 h — extended MT window; assess imaging criteria":"Beyond 24 h — standard MT not indicated; consider extended-window trials"}
        </p>
      </Card>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next} disabled={!h}>Next →</Btn>
      </div>
    </div>
  );
}

function NihssCalc({onScore,initialScores}){
  const ITEMS=[
    {id:"1a",label:"1a. Level of Consciousness",max:3,options:["0 = Alert; keenly responsive","1 = Not alert; arousable by minor stimulation","2 = Not alert; repeated stimulation needed","3 = Unresponsive / reflexive only"]},
    {id:"1b",label:"1b. LOC Questions (month, age)",max:2,options:["0 = Both correct","1 = One correct","2 = Neither correct"]},
    {id:"1c",label:"1c. LOC Commands (open/close eyes, grip/release)",max:2,options:["0 = Both tasks correct","1 = One task correct","2 = Neither task correct"]},
    {id:"2",label:"2. Best Gaze",max:2,options:["0 = Normal","1 = Partial gaze palsy","2 = Forced deviation / total gaze paresis"]},
    {id:"3",label:"3. Visual Fields",max:3,options:["0 = No visual loss","1 = Partial hemianopia","2 = Complete hemianopia","3 = Bilateral hemianopia (blind)"]},
    {id:"4",label:"4. Facial Palsy",max:3,options:["0 = Normal symmetric movements","1 = Minor paralysis (flat nasolabial fold)","2 = Partial paralysis (lower face)","3 = Complete paralysis (one or both sides)"]},
    {id:"5a",label:"5a. Motor Arm — Left",max:4,options:["0 = No drift (holds 90°/45° for 10 s)","1 = Drift (does not hit bed)","2 = Some effort against gravity","3 = No effort against gravity; falls","4 = No movement"]},
    {id:"5b",label:"5b. Motor Arm — Right",max:4,options:["0 = No drift (holds 90°/45° for 10 s)","1 = Drift (does not hit bed)","2 = Some effort against gravity","3 = No effort against gravity; falls","4 = No movement"]},
    {id:"6a",label:"6a. Motor Leg — Left",max:4,options:["0 = No drift (holds 30° for 5 s)","1 = Drift (does not hit bed)","2 = Some effort against gravity","3 = No effort against gravity; falls","4 = No movement"]},
    {id:"6b",label:"6b. Motor Leg — Right",max:4,options:["0 = No drift (holds 30° for 5 s)","1 = Drift (does not hit bed)","2 = Some effort against gravity","3 = No effort against gravity; falls","4 = No movement"]},
    {id:"7",label:"7. Limb Ataxia",max:2,options:["0 = Absent","1 = Present in one limb","2 = Present in two limbs"]},
    {id:"8",label:"8. Sensory",max:2,options:["0 = Normal","1 = Mild-to-moderate loss","2 = Severe to total loss"]},
    {id:"9",label:"9. Best Language",max:3,options:["0 = No aphasia; normal","1 = Mild-to-moderate aphasia","2 = Severe aphasia","3 = Mute / global aphasia"]},
    {id:"10",label:"10. Dysarthria",max:2,options:["0 = Normal","1 = Mild-to-moderate; slurs some words","2 = Severe / unintelligible / mute"]},
    {id:"11",label:"11. Extinction & Inattention",max:2,options:["0 = No abnormality","1 = Inattention/extinction in one modality","2 = Profound hemi-inattention (>1 modality)"]},
  ];
  const [scores,setScores]=useState(initialScores||{});
  const total=Object.values(scores).reduce((a,b)=>a+b,0);
  const answered=Object.keys(scores).length;
  const allDone=answered===ITEMS.length;

  const pick=(id,val)=>{
    const next={...scores,[id]:val};
    setScores(next);
    const t=Object.values(next).reduce((a,b)=>a+b,0);
    onScore(t,next,Object.keys(next).length===ITEMS.length);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontSize:11,color:"#64748b"}}>{answered}/{ITEMS.length} items scored</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,color:"#64748b"}}>Running total:</span>
          <span style={{fontSize:18,fontWeight:800,color:total>=6?"#991b1b":total>0?"#854F0B":"#166534",fontFamily:"monospace"}}>{total}</span>
        </div>
      </div>
      <div style={{background:"#e2e8f0",borderRadius:6,height:4,marginBottom:14}}>
        <div style={{background:"#0C447C",height:4,borderRadius:6,width:`${(answered/ITEMS.length)*100}%`,transition:"width .3s"}}/>
      </div>
      {ITEMS.map(item=>{
        const sel=scores[item.id];
        return(
          <div key={item.id} style={{marginBottom:8,border:"1px solid "+(sel!==undefined?"#c7d2fe":"#e2e8f0"),borderRadius:7,overflow:"hidden",background:sel!==undefined?"#f8fafc":"#fff",transition:"border-color .2s"}}>
            <div style={{padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f1f5f9"}}>
              <span style={{fontSize:11.5,fontWeight:600,color:"#334155"}}>{item.label}</span>
              {sel!==undefined&&<span style={{fontSize:11,fontWeight:700,color:"#0C447C",background:"#E6F1FB",borderRadius:4,padding:"1px 6px"}}>{sel}</span>}
            </div>
            <div style={{padding:"4px 10px 8px"}}>
              {item.options.map((opt,oi)=>{
                const active=sel===oi;
                return(
                  <div key={oi}
                    onClick={()=>pick(item.id,oi)}
                    style={{
                      padding:"5px 8px",margin:"2px 0",borderRadius:5,cursor:"pointer",fontSize:11,
                      background:active?"#0C447C":"transparent",color:active?"#fff":"#475569",
                      fontWeight:active?600:400,transition:"all .15s",
                      border:active?"1px solid #0C447C":"1px solid transparent"
                    }}
                    onMouseEnter={e=>{if(!active)e.currentTarget.style.background="#f1f5f9"}}
                    onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent"}}
                  >{opt}</div>
                );
              })}
            </div>
          </div>
        );
      })}
      {allDone&&<div style={{background:"#EAF3DE",border:"1px solid #3B6D11",borderRadius:8,padding:"10px 14px",marginTop:10}}>
        <p style={{fontSize:12,fontWeight:700,color:"#166534"}}>NIHSS total: {total}/42 — {total===0?"No deficit":total<=5?"Minor stroke":total<=15?"Moderate stroke":total<=20?"Moderate–severe stroke":"Severe stroke"}</p>
      </div>}
    </div>
  );
}

function Step3({data,set,next,back}){
  const [nihss,setNihss]=useState(data.nihss!=null?String(data.nihss):"");
  const [glucose,setGlucose]=useState(data.glucose||"");
  const [calcOpen,setCalcOpen]=useState(data.nihssScores?true:false);
  const [manualMode,setManualMode]=useState(!data.nihssScores&&!calcOpen);
  const glucoseLow=parseFloat(glucose)<2.8&&glucose!=="";

  const handleCalcScore=(total,scores,complete)=>{
    setNihss(String(total));
    set({...data,nihss:total,nihssScores:scores});
  };

  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 3 — Severity &amp; blood glucose</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Assess neurological deficit and exclude hypoglycemia as stroke mimic.</p>

      <Card color="blue">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <Label>NIHSS score (0–42)</Label>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{setManualMode(true);setCalcOpen(false)}} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:manualMode?"1.5px solid #0C447C":"1px solid #cbd5e1",background:manualMode?"#E6F1FB":"#fff",color:manualMode?"#0C447C":"#64748b",cursor:"pointer",fontWeight:manualMode?600:400}}>Enter manually</button>
            <button onClick={()=>{setCalcOpen(true);setManualMode(false)}} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:calcOpen?"1.5px solid #0C447C":"1px solid #cbd5e1",background:calcOpen?"#E6F1FB":"#fff",color:calcOpen?"#0C447C":"#64748b",cursor:"pointer",fontWeight:calcOpen?600:400}}>Calculate NIHSS</button>
          </div>
        </div>

        {manualMode&&<Input type="number" min="0" max="42" value={nihss} placeholder="Enter NIHSS"
          onChange={e=>{setNihss(e.target.value);set({...data,nihss:parseInt(e.target.value)||0,nihssScores:undefined})}}/>}

        {calcOpen&&<div style={{marginTop:8,borderTop:"1px solid #e2e8f0",paddingTop:12}}>
          <NihssCalc onScore={handleCalcScore} initialScores={data.nihssScores}/>
        </div>}

        {nihss&&<p style={{marginTop:8,fontSize:11.5,color:parseInt(nihss)>=6?"#166534":parseInt(nihss)>0?"#854F0B":"#64748b",fontWeight:600}}>
          {parseInt(nihss)===0?"NIHSS 0 — asymptomatic":parseInt(nihss)<=5?"NIHSS 1–5 — minor / non-disabling stroke":"NIHSS ≥6 — disabling stroke (eligible for IV tPA if other criteria met)"}
        </p>}
      </Card>
      <Card color={glucoseLow?"red":"blue"}>
        <Label>Blood glucose (mmol/L)</Label>
        <Input type="number" min="0" max="30" step="0.1" value={glucose} placeholder="e.g. 5.6"
          onChange={e=>{setGlucose(e.target.value);set({...data,glucose:parseFloat(e.target.value)||0})}}/>
        {glucoseLow&&<p style={{marginTop:8,fontSize:12,color:"#991b1b",fontWeight:600}}>⚠ Blood glucose &lt;2.8 mmol/L — treat hypoglycemia first. This may be a stroke mimic.</p>}
        {glucose&&!glucoseLow&&<p style={{marginTop:6,fontSize:11.5,color:"#166534"}}>Blood glucose normal — hypoglycemia excluded as stroke mimic.</p>}
      </Card>
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next} disabled={!nihss||!glucose||glucoseLow}>Next →</Btn>
      </div>
    </div>
  );
}

/* ── ASPECTS interactive calculator ── */
function AspectsCalc({affected,onToggle,score}){
  const REGIONS_BG=[
    {id:"C",label:"C — Caudate",cx:168,cy:155,rx:16,ry:12},
    {id:"L",label:"L — Lentiform",cx:190,cy:178,rx:18,ry:13},
    {id:"IC",label:"IC — Internal capsule",cx:172,cy:192,rx:12,ry:18},
    {id:"I",label:"I — Insular cortex",cx:218,cy:172,rx:14,ry:20},
    {id:"M1",label:"M1 — Anterior MCA (frontal operculum)",cx:228,cy:130,rx:28,ry:28},
    {id:"M2",label:"M2 — Lateral MCA (ant. temporal)",cx:248,cy:185,rx:26,ry:26},
    {id:"M3",label:"M3 — Posterior MCA (post. temporal)",cx:228,cy:240,rx:28,ry:26},
  ];
  const REGIONS_SG=[
    {id:"M4",label:"M4 — Superior to M1",cx:192,cy:115,rx:32,ry:35},
    {id:"M5",label:"M5 — Superior to M2",cx:228,cy:168,rx:30,ry:32},
    {id:"M6",label:"M6 — Superior to M3",cx:210,cy:225,rx:30,ry:30},
  ];
  const allRegions=[...REGIONS_BG,...REGIONS_SG];

  const regionBtn=(r)=>{
    const hit=affected.includes(r.id);
    return(
      <div key={r.id} onClick={()=>onToggle(r.id)}
        style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",margin:"2px 0",borderRadius:5,cursor:"pointer",
        background:hit?"#FCEBEB":"#f8fafc",border:hit?"1px solid #A32D2D":"1px solid #e2e8f0",transition:"all .15s"}}
        onMouseEnter={e=>{if(!hit)e.currentTarget.style.background="#f1f5f9"}}
        onMouseLeave={e=>{if(!hit)e.currentTarget.style.background=hit?"#FCEBEB":"#f8fafc"}}>
        <div style={{width:16,height:16,borderRadius:3,border:hit?"2px solid #A32D2D":"2px solid #cbd5e1",background:hit?"#A32D2D":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {hit&&<span style={{color:"#fff",fontSize:10,fontWeight:800}}>✕</span>}
        </div>
        <span style={{fontSize:11,color:hit?"#991b1b":"#475569",fontWeight:hit?600:400}}>{r.label}</span>
        {hit&&<span style={{fontSize:9,color:"#A32D2D",marginLeft:"auto",fontWeight:700}}>−1</span>}
      </div>
    );
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:11,color:"#64748b"}}>Tap affected regions (each subtracts 1 point)</span>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,color:"#64748b"}}>ASPECTS:</span>
          <span style={{fontSize:20,fontWeight:800,color:score>=7?"#166534":score>=3?"#854F0B":"#991b1b",fontFamily:"monospace"}}>{score}</span>
          <span style={{fontSize:11,color:"#94a3b8"}}>/10</span>
        </div>
      </div>

      {/* SVG brain diagrams side by side */}
      <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:12,background:"#f8fafc",borderRadius:8,padding:"8px 4px",border:"1px solid #e2e8f0"}}>
        {/* Basal ganglia level */}
        <div style={{textAlign:"center",flex:1}}>
          <p style={{fontSize:9,fontWeight:600,color:"#0C447C",marginBottom:4}}>Basal ganglia level</p>
          <svg viewBox="70 60 220 240" width="100%" style={{maxWidth:200}}>
            <ellipse cx="180" cy="180" rx="100" ry="120" fill="none" stroke="#94a3b8" strokeWidth="2"/>
            <line x1="180" y1="60" x2="180" y2="300" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="4"/>
            {REGIONS_BG.map(r=>{
              const hit=affected.includes(r.id);
              return <g key={r.id} onClick={()=>onToggle(r.id)} style={{cursor:"pointer"}}>
                <ellipse cx={r.cx} cy={r.cy} rx={r.rx} ry={r.ry} fill={hit?"rgba(163,45,45,.35)":"rgba(12,68,124,.08)"} stroke={hit?"#A32D2D":"#0C447C"} strokeWidth={hit?2:1.2} strokeDasharray={hit?"":"3"}/>
                <text x={r.cx} y={r.cy+4} textAnchor="middle" fontSize="10" fontWeight="700" fill={hit?"#A32D2D":"#0C447C"}>{r.id}</text>
              </g>;
            })}
            {/* Mirror side (dimmed) */}
            {REGIONS_BG.map(r=>{
              const mx=180-(r.cx-180);
              return <ellipse key={r.id+"m"} cx={mx} cy={r.cy} rx={r.rx} ry={r.ry} fill="rgba(0,0,0,.03)" stroke="#ddd" strokeWidth="0.8" strokeDasharray="3"/>;
            })}
          </svg>
        </div>
        {/* Supraganglionic level */}
        <div style={{textAlign:"center",flex:1}}>
          <p style={{fontSize:9,fontWeight:600,color:"#0C447C",marginBottom:4}}>Above basal ganglia</p>
          <svg viewBox="70 60 220 240" width="100%" style={{maxWidth:200}}>
            <ellipse cx="180" cy="180" rx="100" ry="120" fill="none" stroke="#94a3b8" strokeWidth="2"/>
            <line x1="180" y1="60" x2="180" y2="300" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="4"/>
            {/* Ventricle shapes */}
            <ellipse cx="165" cy="165" rx="8" ry="35" fill="none" stroke="#cbd5e1" strokeWidth="1.2"/>
            <ellipse cx="195" cy="165" rx="8" ry="35" fill="none" stroke="#cbd5e1" strokeWidth="1.2"/>
            {REGIONS_SG.map(r=>{
              const hit=affected.includes(r.id);
              return <g key={r.id} onClick={()=>onToggle(r.id)} style={{cursor:"pointer"}}>
                <ellipse cx={r.cx} cy={r.cy} rx={r.rx} ry={r.ry} fill={hit?"rgba(163,45,45,.35)":"rgba(12,68,124,.08)"} stroke={hit?"#A32D2D":"#0C447C"} strokeWidth={hit?2:1.2} strokeDasharray={hit?"":"3"}/>
                <text x={r.cx} y={r.cy+4} textAnchor="middle" fontSize="10" fontWeight="700" fill={hit?"#A32D2D":"#0C447C"}>{r.id}</text>
              </g>;
            })}
            {REGIONS_SG.map(r=>{
              const mx=180-(r.cx-180);
              return <ellipse key={r.id+"m"} cx={mx} cy={r.cy} rx={r.rx} ry={r.ry} fill="rgba(0,0,0,.03)" stroke="#ddd" strokeWidth="0.8" strokeDasharray="3"/>;
            })}
          </svg>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 8px"}}>
        <div>
          <p style={{fontSize:9,fontWeight:600,color:"#64748b",marginBottom:2,textTransform:"uppercase",letterSpacing:".5px"}}>Basal ganglia level (M1–M3)</p>
          {REGIONS_BG.map(regionBtn)}
        </div>
        <div>
          <p style={{fontSize:9,fontWeight:600,color:"#64748b",marginBottom:2,textTransform:"uppercase",letterSpacing:".5px"}}>Supraganglionic (M4–M6)</p>
          {REGIONS_SG.map(regionBtn)}
        </div>
      </div>

      {score<=7&&<div style={{background:score>=3?"#FAEEDA":"#FCEBEB",border:`1px solid ${score>=3?"#854F0B":"#A32D2D"}`,borderRadius:6,padding:"8px 12px",marginTop:8}}>
        <p style={{fontSize:11,fontWeight:600,color:score>=3?"#633806":"#991b1b"}}>
          {score>=6?"ASPECTS ≤7 — predicts worse functional outcome at 3 months":score>=3?"ASPECTS 3–5 — large core; MT may still benefit (ANGEL-ASPECT, SELECT2)":"ASPECTS 0–2 — very large core; poor prognosis"}
        </p>
      </div>}
    </div>
  );
}

/* ── Step 4 — Neuroimaging ── */
function Step4({data,set,next,back}){
  const [ich,setIch]=useState(data.ich);
  const [lvo,setLvo]=useState(data.lvo);
  const [lvoSite,setLvoSite]=useState(data.lvoSite||"");
  const [circulation,setCirculation]=useState(data.circulation||"");
  const [aspects,setAspects]=useState(data.aspects!=null?String(data.aspects):"");
  const [pcAspects,setPcAspects]=useState(data.pcAspects!=null?String(data.pcAspects):"");
  const [aspectsMode,setAspectsMode]=useState(data.aspectsRegions?"calc":"manual");
  const [pcAspectsMode,setPcAspectsMode]=useState(data.pcAspectsRegions?"calc":"manual");
  const [aspectsAffected,setAspectsAffected]=useState(data.aspectsRegions||[]);
  const [pcAspectsAffected,setPcAspectsAffected]=useState(data.pcAspectsRegions||[]);

  const PC_POINTS={LTh:1,RTh:1,LOc:1,ROc:1,MB:2,Pons:2,LCb:1,RCb:1};

  const toggleAspects=(id)=>{
    const next=aspectsAffected.includes(id)?aspectsAffected.filter(x=>x!==id):[...aspectsAffected,id];
    setAspectsAffected(next);
    const s=10-next.length;
    setAspects(String(s));
    set({...data,aspects:s,aspectsRegions:next});
  };
  const togglePcAspects=(id)=>{
    const next=pcAspectsAffected.includes(id)?pcAspectsAffected.filter(x=>x!==id):[...pcAspectsAffected,id];
    setPcAspectsAffected(next);
    const s=10-next.reduce((a,r)=>a+(PC_POINTS[r]||0),0);
    setPcAspects(String(Math.max(0,s)));
    set({...data,pcAspects:Math.max(0,s),pcAspectsRegions:next});
  };

  const anteriorSites=["Intracranial ICA","MCA M1 segment","MCA M2 segment"];
  const posteriorSites=["Basilar artery"];
  const circ=circulation||(lvoSite&&anteriorSites.includes(lvoSite)?"anterior":lvoSite&&posteriorSites.includes(lvoSite)?"posterior":"");
  const showAspects=ich===false&&(circ==="anterior"||(!circ&&!lvo));
  const showPcAspects=ich===false&&circ==="posterior";
  const activeScore=circ==="posterior"?parseInt(pcAspects):parseInt(aspects);
  const canProceed=ich===false&&(circ==="anterior"?aspects!=="":circ==="posterior"?pcAspects!=="":aspects!=="")&&lvo!==undefined;

  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 4 — Neuroimaging</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>NCCT is mandatory. CTA/MRA required for LVO assessment.</p>

      {/* ICH */}
      <Card color={ich===true?"red":ich===false?"green":"blue"}>
        <Label>NCCT: intracerebral hemorrhage present?</Label>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={()=>{setIch(true);set({...data,ich:true})}} variant={ich===true?"primary":"outline"}>Yes — ICH</Btn>
          <Btn onClick={()=>{setIch(false);set({...data,ich:false})}} variant={ich===false?"primary":"outline"}>No ICH</Btn>
        </div>
        {ich===true&&<p style={{marginTop:10,fontSize:12,color:"#991b1b",fontWeight:600}}>ICH confirmed — IV thrombolysis absolutely contraindicated. Manage as hemorrhagic stroke.</p>}
      </Card>

      {ich===false&&<>
        {/* LVO */}
        <Card color="blue">
          <Label>CTA/MRA: large vessel occlusion (LVO) identified?</Label>
          <div style={{display:"flex",gap:10,marginBottom:8}}>
            <Btn onClick={()=>{setLvo(true);set({...data,lvo:true})}} variant={lvo===true?"primary":"outline"}>Yes — LVO</Btn>
            <Btn onClick={()=>{setLvo(false);set({...data,lvo:false})}} variant={lvo===false?"primary":"outline"}>No LVO</Btn>
          </div>
          {lvo===true&&<>
            <Label>Occlusion site</Label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {[...anteriorSites,...posteriorSites].map(s=>{
                const active=lvoSite===s;
                return <button key={s} onClick={()=>{
                  setLvoSite(s);
                  const c=anteriorSites.includes(s)?"anterior":"posterior";
                  setCirculation(c);
                  set({...data,lvoSite:s,circulation:c});
                }} style={{
                  fontSize:10.5,padding:"5px 10px",borderRadius:5,cursor:"pointer",
                  border:active?"1.5px solid #0C447C":"1px solid #cbd5e1",
                  background:active?"#E6F1FB":"#fff",color:active?"#0C447C":"#475569",fontWeight:active?600:400
                }}>{s}</button>;
              })}
            </div>
            {circ&&<p style={{marginTop:6,fontSize:11,fontWeight:600,color:circ==="anterior"?"#0C447C":"#534AB7"}}>
              {circ==="anterior"?"Anterior circulation — use ASPECTS":"Posterior circulation — use pc-ASPECTS"}
            </p>}
          </>}
          {lvo===false&&<p style={{fontSize:11.5,color:"#854F0B",fontWeight:600}}>No LVO — MT not indicated. ASPECTS still required for prognostication.</p>}
        </Card>

        {/* ASPECTS (anterior) */}
        {(showAspects||(!circ&&ich===false))&&<Card color="blue">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <Label>ASPECTS score (0–10)</Label>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setAspectsMode("manual")} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:aspectsMode==="manual"?"1.5px solid #0C447C":"1px solid #cbd5e1",background:aspectsMode==="manual"?"#E6F1FB":"#fff",color:aspectsMode==="manual"?"#0C447C":"#64748b",cursor:"pointer",fontWeight:aspectsMode==="manual"?600:400}}>Enter manually</button>
              <button onClick={()=>setAspectsMode("calc")} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:aspectsMode==="calc"?"1.5px solid #0C447C":"1px solid #cbd5e1",background:aspectsMode==="calc"?"#E6F1FB":"#fff",color:aspectsMode==="calc"?"#0C447C":"#64748b",cursor:"pointer",fontWeight:aspectsMode==="calc"?600:400}}>Calculate ASPECTS</button>
            </div>
          </div>
          {aspectsMode==="manual"&&<>
            <Input type="number" min="0" max="10" value={aspects} placeholder="Enter ASPECTS"
              onChange={e=>{setAspects(e.target.value);set({...data,aspects:parseInt(e.target.value)||0,aspectsRegions:undefined})}}/>
            {aspects&&<p style={{marginTop:6,fontSize:11.5,fontWeight:600,color:parseInt(aspects)>=7?"#166534":parseInt(aspects)>=3?"#854F0B":"#991b1b"}}>
              {parseInt(aspects)>=7?"ASPECTS ≥7 — small or no ischemic core":parseInt(aspects)>=3?"ASPECTS 3–5 — large core (MT may still benefit within 24 h)":"ASPECTS 0–2 — very large core; poor prognosis"}
            </p>}
          </>}
          {aspectsMode==="calc"&&<div style={{borderTop:"1px solid #e2e8f0",paddingTop:10,marginTop:4}}>
            <AspectsCalc affected={aspectsAffected} onToggle={toggleAspects} score={10-aspectsAffected.length}/>
          </div>}
        </Card>}

        {/* pc-ASPECTS (posterior) */}
        {showPcAspects&&<Card color="purple">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <Label>pc-ASPECTS score (0–10)</Label>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setPcAspectsMode("manual")} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:pcAspectsMode==="manual"?"1.5px solid #534AB7":"1px solid #cbd5e1",background:pcAspectsMode==="manual"?"#EEEDFE":"#fff",color:pcAspectsMode==="manual"?"#534AB7":"#64748b",cursor:"pointer",fontWeight:pcAspectsMode==="manual"?600:400}}>Enter manually</button>
              <button onClick={()=>setPcAspectsMode("calc")} style={{fontSize:10,padding:"3px 8px",borderRadius:4,border:pcAspectsMode==="calc"?"1.5px solid #534AB7":"1px solid #cbd5e1",background:pcAspectsMode==="calc"?"#EEEDFE":"#fff",color:pcAspectsMode==="calc"?"#534AB7":"#64748b",cursor:"pointer",fontWeight:pcAspectsMode==="calc"?600:400}}>Calculate pc-ASPECTS</button>
            </div>
          </div>
          {pcAspectsMode==="manual"&&<>
            <Input type="number" min="0" max="10" value={pcAspects} placeholder="Enter pc-ASPECTS"
              onChange={e=>{setPcAspects(e.target.value);set({...data,pcAspects:parseInt(e.target.value)||0,pcAspectsRegions:undefined})}}/>
            {pcAspects&&<p style={{marginTop:6,fontSize:11.5,fontWeight:600,color:parseInt(pcAspects)>=8?"#166534":parseInt(pcAspects)>=6?"#854F0B":"#991b1b"}}>
              {parseInt(pcAspects)>=8?"pc-ASPECTS ≥8 — favorable prognosis":parseInt(pcAspects)>=6?"pc-ASPECTS 6–7 — moderate ischemia; MT may be considered":"pc-ASPECTS < 6 — extensive ischemia; excluded from ATTENTION/BAOCHE trials"}
            </p>}
          </>}
          {pcAspectsMode==="calc"&&<div style={{borderTop:"1px solid #e2e8f0",paddingTop:10,marginTop:4}}>
            <PcAspectsCalc affected={pcAspectsAffected} onToggle={togglePcAspects} score={Math.max(0,10-pcAspectsAffected.reduce((a,r)=>a+(PC_POINTS[r]||0),0))}/>
          </div>}
        </Card>}
      </>}

      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next} disabled={ich===undefined||ich===true||!canProceed}>Next →</Btn>
      </div>
    </div>
  );
}

function Step5({data,set,next,back}){
  const [checked,setChecked]=useState(data.contraindications||[]);
  const toggle=(c)=>{
    const n=checked.includes(c)?checked.filter(x=>x!==c):[...checked,c];
    setChecked(n);set({...data,contraindications:n});
  };
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 5 — Contraindications to IV thrombolysis</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:16}}>Check all that apply. Any ticked item is a contraindication to IV tPA (patient may still be eligible for MT).</p>
      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"12px 14px"}}>
        {CONTRAINDICATIONS.map((c,i)=>(
          <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"5px 0",borderBottom:i<CONTRAINDICATIONS.length-1?"1px solid #f1f5f9":"none"}}>
            <input type="checkbox" id={`c${i}`} checked={checked.includes(c)} onChange={()=>toggle(c)} style={{marginTop:2,flexShrink:0}}/>
            <label htmlFor={`c${i}`} style={{fontSize:11.5,color:checked.includes(c)?"#991b1b":"#334155",cursor:"pointer"}}>{c}</label>
          </div>
        ))}
      </div>
      {checked.length>0&&<Card color="red"><p style={{fontSize:12,fontWeight:600,color:"#991b1b"}}>⚠ {checked.length} contraindication{checked.length>1?"s":""} to IV tPA noted. Patient may still be eligible for mechanical thrombectomy.</p></Card>}
      {checked.length===0&&<Card color="green"><p style={{fontSize:12,fontWeight:600,color:"#166534"}}>✓ No contraindications identified — proceed to treatment recommendation.</p></Card>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Back</Btn>
        <Btn onClick={next}>Generate recommendation →</Btn>
      </div>
    </div>
  );
}

function Step6({data,back,reset}){
  const h=data.lkwHours||0;
  const nihss=data.nihss||0;
  const aspects=data.aspects!=null?data.aspects:10;
  const pcAspects=data.pcAspects!=null?data.pcAspects:10;
  const lvo=data.lvo;
  const lvoSite=data.lvoSite||"";
  const circ=data.circulation||"anterior";
  const contra=data.contraindications||[];
  const glucose=data.glucose||5;
  const hasContra=contra.length>0;
  const isPost=circ==="posterior";
  const activeAspects=isPost?pcAspects:aspects;
  const aspectsLabel=isPost?"pc-ASPECTS":"ASPECTS";

  const recs=[];

  // IV tPA eligibility
  if(h<=4.5&&nihss>=6&&!hasContra&&glucose>=2.8){
    recs.push({type:"primary",color:"blue",title:"IV thrombolysis — indicated",body:`Start immediately. ${h<=1.5?"Excellent":"Good"} time-benefit window.\n• Alteplase 0.9 mg/kg IV (max 90 mg); 10% bolus over 1 min, remainder over 60 min\n• OR Tenecteplase 0.25 mg/kg IV bolus (max 25 mg) — non-inferior\n• Maintain BP <185/110 during infusion and <180/105 for 24 h after\n• Assess MT eligibility concurrently`});
  } else if(h<=4.5&&nihss>=1&&nihss<=5&&!hasContra){
    recs.push({type:"info",color:"amber",title:"IV thrombolysis — not recommended for NIHSS ≤5",body:"Minor non-disabling stroke. IV alteplase not superior to antiplatelet therapy (PRISMS, ARAMIS trials).\n• Initiate DAPT: clopidogrel + aspirin (preferred) or ticagrelor + aspirin\n• Start within 24 h, continue 21 days, then single antiplatelet"});
  } else if(h>4.5&&nihss>=6&&!hasContra){
    recs.push({type:"info",color:"amber",title:"IV thrombolysis — standard window closed",body:`LKW >${h<=9?"4.5–9 h: consider MRI/perfusion-guided alteplase (WAKE-UP, EXTEND trials)":"9 h: standard IV tPA not indicated"}.\n• Assess for extended-window tPA if wake-up stroke and MRI-DWI/FLAIR mismatch available`});
  }
  if(hasContra){
    recs.push({type:"warn",color:"red",title:"IV thrombolysis — contraindicated",body:`${contra.length} contraindication(s) identified:\n• ${contra.slice(0,3).join("\n• ")}${contra.length>3?`\n• ...and ${contra.length-3} more`:""}\n\nPatient may still be eligible for mechanical thrombectomy.`});
  }

  // MT eligibility — anterior circulation
  if(lvo&&!isPost){
    if(aspects>=6&&h<=6){
      recs.push({type:"primary",color:"purple",title:`Mechanical thrombectomy — strongly indicated (0–6 h, ${lvoSite||"anterior LVO"})`,body:`ASPECTS ${aspects} (≥6), LVO confirmed, within standard window.\n• Proceed to endovascular suite immediately\n• Can be performed concurrently with IV tPA workup (bridging strategy)\n• Post-MT BP target: SBP 140–180 mmHg\n• Evidence: MR CLEAN, ESCAPE, SWIFT PRIME, EXTEND-IA, THRACE`});
    } else if(aspects>=6&&h>6&&h<=16){
      recs.push({type:"primary",color:"purple",title:`Mechanical thrombectomy — extended window (6–16 h, ${lvoSite||"anterior LVO"})`,body:`ASPECTS ${aspects} (≥6). Assess DEFUSE 3 or DAWN eligibility:\n• DEFUSE 3: CTP or MRP to confirm penumbra >1.8× core, core <70 mL\n• DAWN: CTP or MRI-DWI mismatch (deficit too large for core size)\n• If criteria met: proceed to MT\n• Post-MT BP target: SBP 140–180 mmHg`});
    } else if(aspects>=6&&h>16&&h<=24){
      recs.push({type:"primary",color:"purple",title:`Mechanical thrombectomy — late window (16–24 h, ${lvoSite||"anterior LVO"})`,body:`ASPECTS ${aspects} (≥6). Assess DAWN eligibility only (DEFUSE 3 did not include >16 h):\n• Age ≥80: NIHSS ≥10, core <21 mL\n• Age <80: NIHSS ≥10, core <31 mL; or NIHSS ≥20, core <51 mL\n• CTP or MRI-DWI required\n• Post-MT BP target: SBP 140–180 mmHg`});
    } else if(aspects>=3&&aspects<=5&&h<=24){
      recs.push({type:"info",color:"amber",title:`Mechanical thrombectomy — large core (ASPECTS ${aspects}, ${lvoSite||"anterior LVO"})`,body:`Evidence from ANGEL-ASPECT, SELECT2, TENSION, LASTE (2023):\n• MT still shows benefit vs medical management alone\n• Most patients will remain functionally disabled (mRS 3–5)\n• Discuss prognosis with family before proceeding\n• No additional perfusion imaging required\n• Post-MT BP target: SBP 140–180 mmHg`});
    } else if(aspects<3){
      recs.push({type:"warn",color:"red",title:`Mechanical thrombectomy — very large core (ASPECTS ${aspects})`,body:"ASPECTS 0–2 indicates very extensive ischemia.\n• Evidence for MT benefit is limited at this severity\n• Poor prognosis regardless of treatment\n• Discuss goals of care with patient/family"});
    }
  }

  // MT eligibility — posterior circulation (basilar artery)
  if(lvo&&isPost){
    if(pcAspects>=6&&h<=12){
      recs.push({type:"primary",color:"purple",title:`Mechanical thrombectomy — basilar artery occlusion (0–12 h)`,body:`pc-ASPECTS ${pcAspects} (≥6), basilar artery LVO, within ATTENTION trial window.\n• Proceed to endovascular suite\n• ATTENTION trial: mRS 0–3, 46% vs 23% (p<0.001)\n• BAOCHE trial (6–24 h): comparable benefit\n• Post-MT BP target: SBP 140–180 mmHg`});
    } else if(pcAspects>=6&&h>12&&h<=24){
      recs.push({type:"primary",color:"purple",title:`Mechanical thrombectomy — basilar artery occlusion (12–24 h)`,body:`pc-ASPECTS ${pcAspects} (≥6), basilar artery LVO, extended window.\n• Within BAOCHE trial window (6–24 h)\n• BAOCHE: mRS 0–3, 46% vs 24% (p<0.001)\n• Proceed to MT if criteria met\n• Post-MT BP target: SBP 140–180 mmHg`});
    } else if(pcAspects<6){
      recs.push({type:"warn",color:"red",title:`Mechanical thrombectomy — basilar (pc-ASPECTS ${pcAspects} < 6)`,body:"Both ATTENTION and BAOCHE excluded patients with pc-ASPECTS < 6.\n• Extensive posterior circulation ischemia\n• MT benefit not established at this severity\n• Consider goals-of-care discussion"});
    }
  }

  // No LVO
  if(lvo===false){
    recs.push({type:"info",color:"green",title:"Mechanical thrombectomy — not indicated (no LVO)",body:`No large vessel occlusion identified. ${aspectsLabel} ${activeAspects}.\n• If NIHSS ≤5: initiate DAPT (clopidogrel + aspirin) within 24 h\n• If NIHSS ≥6: initiate aspirin 300 mg loading dose\n• Investigate stroke etiology: echocardiogram, cardiac monitoring for AF, lipids, HbA1c`});
  }

  // Antithrombotic fallback
  if(!recs.length){
    recs.push({type:"info",color:"green",title:"Antithrombotic therapy",body:"No IV tPA or MT indication identified.\n• Aspirin 160–300 mg within 48 h (all AIS patients)\n• NIHSS ≤5: consider DAPT (clopidogrel + ASA or ticagrelor + ASA)\n• Hold antithrombotics 24 h if IV tPA was given"});
  }

  const typeColors={primary:"#0C447C",info:"#633806",warn:"#991b1b"};
  const bgColors={blue:"#E6F1FB",purple:"#EEEDFE",green:"#EAF3DE",amber:"#FAEEDA",red:"#FCEBEB"};
  const bdColors={blue:"#185FA5",purple:"#534AB7",green:"#3B6D11",amber:"#854F0B",red:"#A32D2D"};

  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#0C447C",marginBottom:4}}>Step 6 — Recommendation</h2>
      <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Based on the information entered. Always verify with clinical judgment and local protocols.</p>

      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:11}}>
        <b style={{color:"#334155"}}>Summary:</b>{" "}
        <span style={{color:"#64748b"}}>LKW {h}h · NIHSS {nihss} · Glucose {glucose} mmol/L · {isPost?`pc-ASPECTS ${pcAspects}`:`ASPECTS ${aspects}`}{lvoSite?` · ${lvoSite}`:""} · LVO: {lvo?"Yes":"No"} · Contraindications: {contra.length}</span>
        {data.nihssScores&&<details style={{marginTop:6}}>
          <summary style={{cursor:"pointer",fontSize:10,color:"#0C447C",fontWeight:600}}>View NIHSS breakdown</summary>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 12px",marginTop:6,fontSize:10,color:"#64748b"}}>
            {Object.entries(data.nihssScores).map(([k,v])=>(
              <span key={k}>{k}: <b style={{color:"#334155"}}>{v}</b></span>
            ))}
          </div>
        </details>}
        {data.aspectsRegions&&data.aspectsRegions.length>0&&<details style={{marginTop:4}}>
          <summary style={{cursor:"pointer",fontSize:10,color:"#0C447C",fontWeight:600}}>View ASPECTS breakdown</summary>
          <p style={{marginTop:4,fontSize:10,color:"#64748b"}}>Affected regions: <b style={{color:"#991b1b"}}>{data.aspectsRegions.join(", ")}</b> → ASPECTS {aspects}/10</p>
        </details>}
        {data.pcAspectsRegions&&data.pcAspectsRegions.length>0&&<details style={{marginTop:4}}>
          <summary style={{cursor:"pointer",fontSize:10,color:"#534AB7",fontWeight:600}}>View pc-ASPECTS breakdown</summary>
          <p style={{marginTop:4,fontSize:10,color:"#64748b"}}>Affected regions: <b style={{color:"#991b1b"}}>{data.pcAspectsRegions.map(r=>r==="LTh"?"L.Thalamus":r==="RTh"?"R.Thalamus":r==="LOc"?"L.Occipital":r==="ROc"?"R.Occipital":r==="LCb"?"L.Cerebellum":r==="RCb"?"R.Cerebellum":r).join(", ")}</b> → pc-ASPECTS {pcAspects}/10</p>
        </details>}
      </div>

      {recs.map((r,i)=>(
        <div key={i} style={{background:bgColors[r.color],border:`1.5px solid ${bdColors[r.color]}`,borderRadius:8,padding:"14px 16px",marginBottom:12}}>
          <p style={{fontSize:13,fontWeight:700,color:typeColors[r.type]||bdColors[r.color],marginBottom:8}}>{r.title}</p>
          {r.body.split("\n").map((line,j)=>(
            <p key={j} style={{fontSize:11.5,color:"#334155",marginBottom:3}}>{line}</p>
          ))}
        </div>
      ))}

      <Card color="amber">
        <p style={{fontSize:11,color:"#633806"}}><b>Important:</b> This tool is a decision support aid only. All treatment decisions must be made by a qualified clinician accounting for the full clinical picture, patient preferences, and local resources. In case of doubt, consult stroke neurology immediately.</p>
      </Card>

      <div style={{display:"flex",gap:10,marginTop:16}}>
        <Btn onClick={back} variant="outline">← Review inputs</Btn>
        <Btn onClick={reset} variant="outline">↺ Start new case</Btn>
      </div>
    </div>
  );
}

function App(){
  const [step,setStep]=useState(0);
  const [data,setData]=useState({});
  const next=()=>setStep(s=>Math.min(s+1,5));
  const back=()=>setStep(s=>Math.max(s-1,0));
  const reset=()=>{setData({});setStep(0);};

  const containerStyle={maxWidth:680,margin:"0 auto",background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 2px 16px rgba(0,0,0,.1)"};
  const headerStyle={background:"#0C447C",padding:"16px 24px",display:"flex",alignItems:"center",gap:12};
  const bodyStyle={padding:"24px"};

  return(
    <div style={containerStyle}>
      <div style={headerStyle}>
        <div style={{width:40,height:40,background:"rgba(255,255,255,.15)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🧠</div>
        <div>
          <h1 style={{color:"#E6F1FB",fontSize:15,fontWeight:600,margin:0}}>AIS Clinical Decision Algorithm</h1>
          <p style={{color:"#85B7EB",fontSize:10.5,margin:"2px 0 0"}}>Ho &amp; Powers, <em>Annu. Rev. Med.</em> 2025 · AHA/ASA 2019 Guidelines</p>
        </div>
      </div>
      <div style={bodyStyle}>
        <StepBar current={step}/>
        {step===0&&<Step1 data={data} set={setData} next={next}/>}
        {step===1&&<Step2 data={data} set={setData} next={next} back={back}/>}
        {step===2&&<Step3 data={data} set={setData} next={next} back={back}/>}
        {step===3&&<Step4 data={data} set={setData} next={next} back={back}/>}
        {step===4&&<Step5 data={data} set={setData} next={next} back={back}/>}
        {step===5&&<Step6 data={data} back={back} reset={reset}/>}
      </div>
      <div style={{background:"#f8fafc",borderTop:"1px solid #e2e8f0",padding:"8px 24px",fontSize:9,color:"#94a3b8"}}>
        For educational use only · Not a substitute for clinical judgment · Reference: Ho JP, Powers WJ. <em>Annu. Rev. Med.</em> 2025; 76:417–29
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
